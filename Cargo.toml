[workspace]
resolver = "3"
members = [
    "crates/kb-core",
    "crates/kb-parse-types",
    "crates/kb-config",
    "crates/kb-source-fs",
    "crates/kb-parse-md",
    "crates/kb-normalize",
    "crates/kb-app",
    "crates/kb-cli",
]

[workspace.package]
edition       = "2024"
rust-version  = "1.85"
license       = "MIT OR Apache-2.0"
repository    = "https://github.com/altair823/kb"
version       = "0.1.0"

[workspace.dependencies]
anyhow       = "1"
thiserror    = "2"
serde        = { version = "1", features = ["derive"] }
serde_json   = "1"
time         = { version = "0.3", features = ["serde", "macros", "formatting", "parsing"] }
uuid         = { version = "1", features = ["v7", "serde"] }
blake3       = "1"
tracing      = "0.1"
